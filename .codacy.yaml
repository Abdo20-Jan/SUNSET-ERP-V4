---
# Codacy configuration — sunset-erp-v4
# Docs: https://docs.codacy.com/repositories-configure/configuration-file/

engines:
  semgrep:
    enabled: true
    exclude_patterns:
      # Uso legítimo do SDK Anthropic — projeto integra IA intencionalmente
      # (extracto-parser, lead-summarizer, sentiment)
      - "Semgrep_ai.typescript.detect-anthropic"
      - "ai.typescript.detect-anthropic"
      # Falsos positivos comuns em template strings com símbolos $
      - "Semgrep_javascript.lang.best-practice.missing-template-string-indicator.missing-template-string-indicator"
      # Math.random() para UI skeleton widths não é crypto-sensitive
      - "Semgrep_rules_lgpl_javascript_crypto_rule-node-insecure-random-generator"
      # Constantes UI (keyboard shortcut "b") não são senhas
      - "Semgrep_codacy.javascript.security.hard-coded-password"
      # `^X.Y.Z` em devDependencies (husky, lint-staged) é padrão npm — não é hijack risk
      - "Semgrep_json.npm.security.package-dependencies-check.package-dependencies-check"
  lizard:
    enabled: true
  # ESLint (legacy ESLint 8) deshabilitado: el repo ya tiene activo
  # "ESLint9" via Codacy UI (usesConfigurationFile: true, lee
  # `eslint.config.mjs`). El tool legacy "ESLint" carga plugins que el
  # proyecto no usa (es-x compat, @lwc, @salesforce/aura, flowtype,
  # promise/no-native, react-in-jsx-scope obsoleto desde React 17),
  # generando cientos de falsos positivos a cada PR. El job `lint` del
  # CI (`pnpm lint`, ESLint 9 con `eslint.config.mjs`) es el required
  # check — single source of truth para JS/TS lint.
  eslint:
    enabled: false
  biome:
    enabled: true

exclude_paths:
  - "src/generated/**"
  - "prisma/migrations/**"
  - ".next/**"
  - "node_modules/**"
  - "*.config.{js,mjs,ts}"
  - "biome.json"
  - "**/*.generated.*"
