name: validar-asientos

# Valida invariantes del LEDGER contable diariamente contra DB de producción
# (Railway). Espejo de validar-stock.yml para los asientos.
# Invariantes (ver prisma/validar-invariantes-asiento.ts):
#   A1: Asiento.moneda == ARS
#   A2: totalDebe == totalHaber (partida doble)
#   A3: Σ líneas.debe == totalDebe  y  Σ líneas.haber == totalHaber
#   A4: cada línea tiene exactamente un lado > 0 (debe XOR haber), no-negativo
#   A5: monedaOrigen ∈ {USD, null}; USD → montoOrigen>0 y tipoCambioOrigen>0;
#       null → montoOrigen y tipoCambioOrigen ambos null
#
# Schedule diario (cron 30 9 * * * = 06:30 ART, desfasado del de stock).
# Falla → abre issue automática.

on:
  schedule:
    # 06:30 ART (UTC-3) = 09:30 UTC (desfasado de validar-stock 09:00 UTC)
    - cron: "30 9 * * *"
  workflow_dispatch:

concurrency:
  group: validar-asientos-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  validar:
    name: validar invariantes ledger
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma generate

      - name: Validar invariantes
        id: validar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: |
          set +e
          # pipefail: el exit code del pipe `cmd | tee` debe ser el de `cmd`,
          # no el de `tee` (que siempre sale 0) — si no, una violación real
          # nunca falla el workflow ni abre issue (monitoreo muerto).
          set -o pipefail
          pnpm db:validar-asientos 2>&1 | tee validar-asientos.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validar-asientos-log
          path: validar-asientos.log
          retention-days: 30

      - name: Criar issue em caso de violação
        if: steps.validar.outputs.exit_code != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('validar-asientos.log', 'utf8').slice(0, 60000);
            const today = new Date().toISOString().slice(0, 10);
            const title = `[validar-asientos] Invariante del ledger violada — ${today}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'validar-asientos'
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('Issue já existe pra hoje — skip');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['validar-asientos', 'bug', 'prod'],
              body: [
                '## Violação de invariante del ledger contable detectada',
                '',
                `Workflow: ${context.workflow} · Run: [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### Output do validador',
                '',
                '```',
                log,
                '```',
                '',
                '### Próximos passos',
                '',
                '1. Identificar o asiento afetado no log (número + período + id).',
                '2. Investigar a origem: escrita fora do motor (`asiento-automatico.ts`), `db push` antigo ou bug.',
                '3. Lembrar a regra canônica: ledger 100% ARS em debe/haber; USD só em metadata (monedaOrigen/montoOrigen/tipoCambioOrigen); saldo USD = Σ montoOrigen.',
              ].join('\n'),
            });

      - name: Falhar workflow se violação
        if: steps.validar.outputs.exit_code != '0'
        run: |
          echo "::error::Invariante do ledger violada — ver log + issue automática."
          exit 1
