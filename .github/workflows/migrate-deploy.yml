name: migrate-deploy

# Aplica as migrations de Prisma em PRODUÇÃO automaticamente quando entram em
# `main` (merge). Substitui o `prisma db push --url $PROD_URL` manual que se
# rodava à mão depois de cada PR de schema (a pegadinha P2022 ColumnNotFound).
#
# Secret: reusa `DATABASE_URL_PROD` (repo-level, o MESMO que `validar-stock.yml`
# já usa para rodar Prisma contra prod). Esse secret DEVE ser a connection string
# DIRETA do Railway (sem pooler) — `migrate deploy` usa advisory locks/DDL que o
# PgBouncer em transaction-pooling não suporta. O prod atual não usa pooler, então
# o secret já é direto; nenhum secret novo precisa ser criado.
#
# PRÉ-REQUISITO DE BASELINING (one-time, banco de prod já existente): antes do
# PRIMEIRO merge que introduz `prisma/migrations/`, é OBRIGATÓRIO rodar
# `prisma migrate resolve --applied 0_init` contra prod (ver DEPLOY.md §4 →
# "Adoção do baseline"). Senão este job tentará rodar os CREATE TABLE do 0_init
# sobre tabelas que já existem e a migration ficará marcada como failed.
#
# Segurança: `on: push` (não `pull_request`) → secrets NÃO se expõem a PRs de fork.

on:
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"

# Nunca rodar dois `migrate deploy` em paralelo, e NUNCA cancelar um em voo
# (cancelar uma migração no meio corrompe o estado de _prisma_migrations).
concurrency:
  group: migrate-deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-deploy:
    name: migrate deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma migrate deploy
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
