name: migrate-deploy

# Aplica as migrations de Prisma em PRODUÇÃO automaticamente quando entram em
# `main` (merge). Substitui o `prisma db push --url $PROD_URL` manual que se
# rodava à mão depois de cada PR de schema (a pegadinha P2022 ColumnNotFound).
#
# Secret: reusa `DATABASE_URL_PROD` (o MESMO que `validar-stock.yml` já usa, SEM
# declarar environment — esse é o escopo onde o secret está acessível e provado).
# DEVE ser a connection string DIRETA do Railway (sem pooler) — `migrate deploy`
# usa advisory locks/DDL que o PgBouncer em transaction-pooling não suporta. O
# prod atual não usa pooler, então o secret já é direto.
#
# NOTA (2026-06-17): NÃO declarar `environment:` aqui — a 1ª versão usava
# `environment: production` e o `secrets.DATABASE_URL_PROD` resolveu VAZIO
# ("Connection url is empty"). O `validar-stock` (sem environment) acessa o
# mesmo secret e funciona; espelhamos esse escopo.
#
# PRÉ-REQUISITO DE BASELINING (one-time, banco de prod já existente): antes do
# PRIMEIRO merge que introduz `prisma/migrations/`, é OBRIGATÓRIO rodar
# `prisma migrate resolve --applied 0_init` contra prod (ver DEPLOY.md §4 →
# "Adoção do baseline"). Senão este job tentará rodar os CREATE TABLE do 0_init
# sobre tabelas que já existem e a migration ficará marcada como failed.
#
# Segurança: `on: push` (não `pull_request`) → secrets NÃO se expõem a PRs de fork.

on:
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"
  # Permite re-rodar/testar manualmente (ex.: após corrigir um deploy falho).
  workflow_dispatch:

# Nunca rodar dois `migrate deploy` em paralelo, e NUNCA cancelar um em voo
# (cancelar uma migração no meio corrompe o estado de _prisma_migrations).
concurrency:
  group: migrate-deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-deploy:
    name: migrate deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma migrate deploy
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
